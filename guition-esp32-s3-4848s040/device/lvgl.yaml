lvgl:
  buffer_size: 100%

  top_layer:
    widgets:
      - label:
          id: temperatures
          text: "-° / -°"
          align: top_left
          x: 8
          y: 4

      - label:
          id: display_time
          text: "--:--"
          align: top_mid
          x: 0
          y: 4

  pages:
    - id: main_page
      layout:
        type: grid
        grid_columns: [1, 1]
        grid_rows: [1, 1]

      pad_top: 34
      pad_left: 5
      pad_right: 5
      pad_bottom: 5
      bg_color: Black

      widgets:

        - button:
            id: billard_nav_button
            text: "Billardbord"
            on_click:
              - lvgl.page.show: billard_page

        - button:
            id: vaglampe_nav_button
            text: "Væglampe"
            on_click:
              - lvgl.page.show: vaglampe_page

        - button:
            id: sofagruppe_nav_button
            text: "Sofagruppe"
            on_click:
              - lvgl.page.show: sofagruppe_page

        - button:
            id: bar_toggle_button
            text: "Bar"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.bar_placeholder