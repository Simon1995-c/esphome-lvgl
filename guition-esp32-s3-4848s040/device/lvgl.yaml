lvgl:
  buffer_size: 100%

  # =========================================================================
  # PAGE: Main page
  # =========================================================================
  pages:
    - id: main_page
      layout:
        type: grid
        grid_columns: [fr(1), fr(1)]
        grid_rows: [fr(1), fr(1)]
      width: 100%
      scrollbar_mode: "off"
      scroll_dir: "hor"
      bg_color: Black
      pad_top: 5
      pad_left: 5
      pad_right: 5
      pad_bottom: 5

      widgets:
        - button:
            height: $button_height
            width: $button_width
            id: billard_nav_button
            styles: control
            grid_cell_column_pos: 0
            grid_cell_row_pos: 0
            widgets:
              - label:
                  align: center
                  text: "Billard >"
            on_click:
              - lvgl.page.show: billard_page
        - button:
            height: $button_height
            width: $button_width
            id: sofagruppe_nav_button
            styles: control
            grid_cell_column_pos: 1
            grid_cell_row_pos: 0
            widgets:
              - label:
                  align: center
                  text: "Sofa >"
            on_click:
              - lvgl.page.show: sofa_page
        - button:
            height: $button_height_small
            width: $button_width_small
            id: bar_toggle
            styles: control
            grid_cell_column_pos: 0
            grid_cell_row_pos: 1
            widgets:
              - label:
                  align: center
                  text: "Bar"
            on_click:
              - homeassistant.service:
                  service: switch.toggle
                  data:
                    entity_id: switch.barlys
        - button:
            height: $button_height_small
            width: $button_width_small
            id: fadol_toggle
            styles: control
            grid_cell_column_pos: 1
            grid_cell_row_pos: 1
            widgets:
              - label:
                  align: center
                  text: "Fadølslys"
            on_click:
              - homeassistant.service:
                  service: switch.toggle
                  data:
                    entity_id: switch.barlys
    - id: sofa_page
      layout:
        type: grid
        grid_columns: [fr(1), fr(1), fr(1)]
        grid_rows: [fr(1), fr(1), fr(1)]
      width: 100%
      scrollbar_mode: "off"
      scroll_dir: "hor"
      bg_color: Black
      pad_top: 10
      pad_left: 10
      pad_right: 10
      pad_bottom: 10
      widgets:
        - button:
            height: $button_height_small
            width: $button_width_small
            checkable: false
            styles: control
            grid_cell_row_pos: 0
            grid_cell_column_pos: 0
            widgets:
              - label:
                  text_font: $icon_font
                  align: center
                  text: $chevron_left
            on_click:
              - lvgl.page.show: main_page
        - button:
            height: $button_height_small
            width: $button_width_small
            id: vaglampe_toggle
            styles: control
            grid_cell_row_pos: 0
            grid_cell_column_pos: 1
            widgets:
              - label:
                  align: center
                  text: "Væglamper"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.garage_vaeglampe_1
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.garage_vaeglampe_2
        - button:
            height: $button_height
            width: $button_width
            id: sofalampe_toggle
            widgets:
              - label:
                  align: center
                  text: "Sofalampe"
            styles: control
            grid_cell_row_pos: 0
            grid_cell_column_pos: 2
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.garage_loftlampe_3
        - button:
            height: $button_height_small
            width: $button_width_small
            id: sofa_100
            styles: control
            grid_cell_row_pos: 1
            grid_cell_column_pos: 0
            widgets:
              - label:
                  align: center
                  text: "100%--"
            on_click:
              - homeassistant.service:
                  service: light.turn_on
                  data:
                    entity_id: light.garage_vaeglampe_1
                    brightness: "254"
              - homeassistant.service:
                  service: light.turn_on
                  data:
                    entity_id: light.garage_vaeglampe_2
                    brightness: "254"
              - homeassistant.service:
                  service: light.turn_on
                  data:
                    entity_id: light.garage_loftlampe_3
                    brightness: "254"
        - button:
            height: $button_height_small
            width: $button_width_small
            id: sofa_75
            styles: control
            grid_cell_row_pos: 1
            grid_cell_column_pos: 1
            widgets:
              - label:
                  align: center
                  text: "75%"
            on_click:
              - homeassistant.service:
                  service: light.turn_on
                  data:
                    entity_id: light.garage_vaeglampe_1
                    brightness: "191"
              - homeassistant.service:
                  service: light.turn_on
                  data:
                    entity_id: light.garage_vaeglampe_2
                    brightness: "191"
              - homeassistant.service:
