lvgl:
  buffer_size: 100%

  pages:
    - id: main_page
      layout:
        type: grid
        grid_columns: [fr(1), fr(1)]
        grid_rows: [fr(1), fr(1)]
      width: 100%
      scrollbar_mode: "off"
      scroll_dir: "hor"
      bg_color: Black

      widgets:
        - button:
            height: $button_height_single
            width: $button_width
            id: billard_nav_button
            text: "Billardbord"
            styles: control
            grid_cell_column_pos: 0
            grid_cell_row_pos: 0
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.garage_loftlampe_1

        - button:
            height: $button_height_single
            width: $button_width
            id: vaglampe_nav_button
            text: "Væglampe"
            styles: control
            grid_cell_column_pos: 1
            grid_cell_row_pos: 0
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.garage_vaeglampe_1
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.garage_vaeglampe_2
        - button:
            height: $button_height_single
            width: $button_width
            id: sofagruppe_nav_button
            text: "Sofagruppe"
            styles: control
            grid_cell_column_pos: 0
            grid_cell_row_pos: 1
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.garage_loftlampe_3
        - button:
            height: $button_height_single
            width: $button_width
            id: bar_toggle_button
            text: "Bar"
            styles: control
            grid_cell_column_pos: 1
            grid_cell_row_pos: 1
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.garage_loftlampe_2
