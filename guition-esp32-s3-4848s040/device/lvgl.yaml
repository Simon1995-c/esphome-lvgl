                  data:
                    entity_id: light.garage_loftlampe_3
                    brightness: "191"
        - button:
            height: $button_height_small
            width: $button_width_small
            id: sofa_50
            styles: control
            grid_cell_row_pos: 1
            grid_cell_column_pos: 2
            widgets:
              - label:
                  align: center
                  text: "50%"
            on_click:
              - homeassistant.service:
                  service: light.turn_on
                  data:
                    entity_id: light.garage_vaeglampe_1
                    brightness: "127"
              - homeassistant.service:
                  service: light.turn_on
                  data:
                    entity_id: light.garage_vaeglampe_2
                    brightness: "127"
              - homeassistant.service:
                  service: light.turn_on
                  data:
                    entity_id: light.garage_loftlampe_3
                    brightness: "127"
        - button:
            height: $button_height_small
            width: $button_width_small
            id: sofa_25
            styles: control
            grid_cell_row_pos: 2
            grid_cell_column_pos: 0
            widgets:
              - label:
                  align: center
                  text: "25%"
