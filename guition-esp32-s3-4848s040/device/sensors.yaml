# ============================================================
# SIMPLE LVGL LIGHT CONTROL ONLY
# (Matches your current UI)
# ============================================================

binary_sensor:

  # -----------------------------
  # BAR
  # -----------------------------
  - platform: homeassistant
    id: bar_light_state
    entity_id: light.garage_loftlampe_2
    trigger_on_initial_state: true
    on_state:
      then:
        - lvgl.widget.update:
            id: bar_toggle_button
            state:
              checked: !lambda "return x;"

  # -----------------------------
  # BILLIARDBORD
  # -----------------------------
  - platform: homeassistant
    id: billard_state
    entity_id: light.garage_loftlampe_1
    trigger_on_initial_state: true
    on_state:
      then:
        - lvgl.widget.update:
            id: billard_nav_button
            state:
              checked: !lambda "return x;"

  # -----------------------------
  # VÆGLAMPE (2 lights combined)
  # -----------------------------
  - platform: homeassistant
    id: vaglampe_1
    entity_id: light.garage_vaeglampe_1
    trigger_on_initial_state: true

  - platform: homeassistant
    id: vaglampe_2
    entity_id: light.garage_vaeglampe_2
    trigger_on_initial_state: true

    on_state:
      then:
        - lvgl.widget.update:
            id: vaglampe_nav_button
            state:
              checked: !lambda |-
                return id(vaglampe_1).state || id(vaglampe_2).state;

  # -----------------------------
  # SOFAGRUPPE
  # -----------------------------
  - platform: homeassistant
    id: sofa_state
    entity_id: light.garage_loftlampe_3
    trigger_on_initial_state: true
    on_state:
      then:
        - lvgl.widget.update:
            id: sofagruppe_nav_button
            state:
              checked: !lambda "return x;"